{% extends 'store/base.html' %}

{% block content %}
  <h2>{{ profile.user.username }}</h2>
  <p>Email: {{ profile.user.email }}</p>
  <p>Bio: {{ profile.address1 }}</p>
  <p>Location: {{ profile.city }}</p>
  <p>Location: {{ profile.country }}</p>
  <p>If you want to change your password:</p>
  <a href="{% url 'password_change' %}">Press Here</a>
{% endblock %}
