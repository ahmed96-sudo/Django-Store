{% extends "../store/base.html" %}
{% block title %}Password Changing for User {{ request.user.username }}{% endblock %}

{% block content %}
<div class="container">
    <h2>Password Changing Process Complete</h2>
    <p>
        Your password has been successfully changed. You can now log in with your new password.
    </p>
    <p class="mt-3">
        <a href="{% url 'login' %}" class="btn btn-primary">Log In</a>
    </p>
</div>
{% endblock %}
